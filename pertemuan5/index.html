<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai Mahasiswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cek Nilai Mahasiswa</h1>
        <div class="form-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" placeholder="Masukkan NIM" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="nilai">Nilai</label>
            <input type="number" id="nilai" placeholder="0 - 100" min="0" max="100">
        </div>
        <button onclick="cekNilai()">Cek Nilai</button>

        <div class="result" id="hasil"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
